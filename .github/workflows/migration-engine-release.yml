name: Migration engine release gate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out OmniKit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: omnikit
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: omnikit/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install OmniKit dependencies
        working-directory: omnikit
        run: npm ci

      - name: Install supported browser test runtime
        working-directory: omnikit
        run: npx playwright install --with-deps chromium

      - name: Install and attest the first-party migration engine
        working-directory: omnikit
        env:
          NODE_ENV: production
          OMNIKIT_MIGRATION_ENGINE_BOOTSTRAP_PYTHON: python
        run: npm run setup:migration-engine:test

      - name: Run first-party parser and deterministic translation tests
        working-directory: omnikit
        run: npm run test:migration-engine:python

      - name: Verify first-party package provenance and contracts
        working-directory: omnikit
        run: npm run verify:migration-engine:internal

      - name: Run deterministic integration and acceptance-harness tests
        working-directory: omnikit
        run: npm run test:e2e:migration-engine

      - name: Verify installed first-party runtime provenance and contracts
        working-directory: omnikit
        run: npm run verify:migration-engine

      - name: Verify source ownership, fixtures, and rulebooks
        working-directory: omnikit
        run: npm run verify:migration-source-adapters

      - name: Validate declared release governance
        working-directory: omnikit
        run: npm run verify:release-governance

      - name: Generate sanitized runtime diagnostics
        working-directory: omnikit
        run: npm run diagnose:migration-engine

      - name: Run credential-free release benchmark
        working-directory: omnikit
        run: npm run benchmark:migration-engine -- --strict

      - name: Attest the exact release scope
        working-directory: omnikit
        run: npm run prepare:migration-studio:release -- --require-clean --output artifacts/release/migration-studio-release-scope.json

      - name: Prove clean-room first-party runtime ownership
        working-directory: omnikit
        run: npm run verify:migration-studio:clean-room

      - name: Record operational qualification status
        working-directory: omnikit
        run: npm run qualify:migration-studio:operations -- --source looker

      - name: Generate preview release certificate
        if: github.event_name == 'workflow_dispatch'
        working-directory: omnikit
        run: npm run certify:migration-studio -- --require-clean-release --require-preview-ready --scope artifacts/release/migration-studio-release-scope.json --output artifacts/release/migration-studio-certificate.json

      - name: Generate GA release certificate
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: omnikit
        run: npm run certify:migration-studio -- --require-clean-release --scope artifacts/release/migration-studio-release-scope.json --require-release-ready --output artifacts/release/migration-studio-certificate.json

      - name: Upload sanitized release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: migration-studio-release-evidence-${{ github.sha }}
          path: |
            omnikit/artifacts/release/
            omnikit/artifacts/security/
          if-no-files-found: error
          retention-days: 30
